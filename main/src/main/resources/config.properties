# ═══════════════════════════════════════════════════════════
#  CONFIGURACIÓN BASE (valores modificables al arrancar via wizard)
#  El NodeSetupWizard sobreescribe estos valores en memoria
#  antes de que el servidor arranque.
# ═══════════════════════════════════════════════════════════

# -- Servidor de Mensajería --
server.port=8081
server.protocol=TCP
server.host=localhost
server.maxConnections=100

# -- Base de Datos y Almacenamiento --
db.url=jdbc:mysql://localhost:3307/messaging_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
db.user=messaging_app
db.password=messaging_app
storage.originalDir=uploads/original
storage.encryptedDir=uploads/encrypted

# -- Cluster P2P --
# Poner en true para activar el modo distribuido
cluster.enabled=true

# Identificador único de este nodo (debe ser único en la red)
cluster.nodeId=node-1

# Puerto TCP donde este nodo escucha conexiones de otros servidores (PeerServer)
# Y también donde Gossip Protocol hace UDP
cluster.port=9090

# Intervalo entre heartbeats Gossip (ms)
cluster.heartbeatIntervalMs=2000

# Timeout para declarar un nodo como DOWN (ms)
cluster.failureTimeoutMs=10000

# Nodos semilla para bootstrap del cluster (host:clusterPort separados por coma)
# Para el nodo primario dejar vacío. Para nodos secundarios: localhost:9090
cluster.seedNodes=
